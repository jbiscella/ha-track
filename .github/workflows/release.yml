name: Release

# Publishes every reactor module to Maven Central when a GitHub Release is
# PUBLISHED (tag `v<version>`, e.g. v0.52.1-alpha), or on a manual
# "Run workflow" (workflow_dispatch) re-attempt.
#
# Decoupled from merges to main on purpose: a version bump landing on main no
# longer publishes by itself. You publish explicitly by cutting a release once
# main is complete. This removes the failure mode where an INCOMPLETE main got
# published because a bump commit merged before the rest of the work.
#
# iOS / no-CLI flow: GitHub mobile app -> Releases -> Draft a new release ->
# create tag `v<version>` targeting `main` -> Publish release. That fires this
# workflow. (Publishing the GitHub Release does NOT auto-publish on Central:
# autoPublish is false in the root pom `release` profile, so after the deploy
# step succeeds you click Publish in the Central Portal UI.)
#
# SNAPSHOT versions are skipped — Maven Central only accepts release versions.
# The release tag MUST equal the root pom version prefixed with `v` (so
# `v<version>`); a mismatch fails the run so a mistagged release can't publish
# the wrong artifacts.
#
# Central verifies the GPG signatures by fetching the public key from a
# keyserver. The public half of the key in GPG_PRIVATE_KEY MUST be uploaded
# to keyserver.ubuntu.com — the "Show the signing key fingerprint" step
# below prints exactly which key fingerprint CI signs with.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   CENTRAL_TOKEN_USERNAME  - Maven Central Portal user-token username
#   CENTRAL_TOKEN_PASSWORD  - Maven Central Portal user-token password
#   GPG_PRIVATE_KEY         - ASCII-armored GPG private key used to sign artifacts
#   GPG_PASSPHRASE          - passphrase for that GPG key
#
# One-time manual prerequisite (cannot be automated): the `net.jacopobiscella`
# namespace must be verified in the Central Portal. With autoPublish=false in
# the root pom `release` profile, this workflow uploads a deployment that is
# then released manually from the Central Portal UI.

on:
  release:
    types: [published]
  workflow_dispatch:        # manual re-attempt (run from main or a tag)

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to publish
        id: version
        env:
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version_of() { grep -m1 '<version>' | sed -E 's/.*<version>(.+)<\/version>.*/\1/'; }
          new=$(version_of < pom.xml)
          echo "pom version: ${new:-<none>}"
          echo "event: $EVENT   release tag: ${TAG:-<none>}"
          if [ -z "$new" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No version found in the root pom — skipping."
            exit 0
          fi
          if [[ "$new" == *SNAPSHOT* ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "SNAPSHOT version — Maven Central only accepts releases. Skipping."
            exit 0
          fi
          # On a published GitHub Release, the tag must match the pom version as
          # v<version>. (A workflow_dispatch re-attempt has no tag to check.)
          if [ "$EVENT" = "release" ] && [ "$TAG" != "v$new" ]; then
            echo "::error::Release tag '$TAG' does not match the root pom version (expected 'v$new'). Re-tag the release as v$new."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25 (Amazon Corretto)
        if: steps.version.outputs.publish == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '25'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Show the signing key fingerprint
        if: steps.version.outputs.publish == 'true'
        run: |
          # The public half of THIS key must be on keyserver.ubuntu.com for
          # Maven Central to verify the .asc signatures.
          gpg --list-secret-keys --keyid-format=long --fingerprint

      - name: Build, sign and deploy to Maven Central
        if: steps.version.outputs.publish == 'true'
        run: ./mvnw -Prelease --batch-mode --no-transfer-progress deploy
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
